<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(23, 31, 51, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
        }
        .primary-glow {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.3);
        }
        .floating-anim {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .progress-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary/30">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 h-16 px-margin-desktop flex items-center justify-between bg-surface-container/60 backdrop-blur-xl border-b border-outline-variant/20">
<div class="flex items-center gap-stack-md">
<button class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface-variant/50 hover:bg-surface-variant transition-all active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back_ios_new</span>
</button>
<div class="flex items-center gap-2">
<span class="text-2xl">📚</span>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">知识问答</h1>
</div>
</div>
<button class="flex items-center gap-2 px-4 py-2 rounded-xl border border-error/30 text-error hover:bg-error/10 transition-colors active:scale-95">
<span class="material-symbols-outlined">logout</span>
<span class="font-label-md text-label-md">退出练习</span>
</button>
</header>
<main class="pt-24 pb-32 max-w-[800px] mx-auto px-margin-mobile md:px-0 space-y-stack-lg">
<!-- Progress Indicator -->
<div class="flex items-center gap-gutter">
<div class="flex-shrink-0 font-headline-md text-headline-md text-primary">
<span class="font-body-md text-on-surface-variant">第</span>
<span class="font-bold">12/248</span>
<span class="font-body-md text-on-surface-variant">题</span>
</div>
<div class="flex-grow h-2 bg-surface-variant rounded-full relative overflow-hidden">
<div class="absolute left-0 top-0 h-full w-[4.8%] primary-gradient progress-glow rounded-full"></div>
</div>
<div class="flex-shrink-0 font-label-md text-label-md text-on-surface-variant">
                4.8%
            </div>
</div>
<!-- Question Card -->
<div class="glass-panel rounded-3xl p-8 relative overflow-hidden group">
<div class="relative z-10 flex flex-col md:flex-row justify-between items-start gap-stack-lg">
<div class="space-y-stack-md flex-1">
<div class="flex items-center gap-3">
<span class="px-3 py-1 rounded-lg bg-primary-container/20 text-primary border border-primary/30 font-label-md text-label-md">
                            多选题
                        </span>
<span class="text-on-surface-variant font-label-md text-label-md">本题 2 分</span>
</div>
<h2 class="font-headline-xl text-headline-xl text-on-surface leading-tight">
                        以下哪些是 Python 的核心特性？
                    </h2>
<p class="text-on-surface-variant font-body-md">请选择所有正确的选项 (<span class="text-primary-fixed">多选</span>)</p>
</div>
<!-- Floating 3D Graphic (Stylized Code Book) -->
<div class="hidden md:flex relative w-48 h-48 items-center justify-center">
<div class="absolute inset-0 bg-primary/10 blur-3xl rounded-full"></div>
<div class="floating-anim relative">
<img alt="Python 3D Icon" class="w-32 h-32 rounded-2xl primary-glow border border-white/20 rotate-12" data-alt="A futuristic 3D icon of a stylized Python programming book, glowing with vibrant indigo and purple neon colors. The book is suspended in a dark, atmospheric space with faint floating code snippets like brackets and slashes in the background. Digital lens flare and soft particles enhance the high-tech, cyber-educational aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6MhGkmGFx98HHdURrTO1_jQpdsXbDr7TtJtvfhfjQLS7NxFfmM0kRE3WKKJsJlz_Waesr7vzGsPEAttKjThy1jVUOcgelKU0On7kP1gM4F2O8guApo7-BVfskk9OPkMgAk9kUEUe9zI1WoBc0K7cdz5wDbIJdiXsmiWS4T_cU3wOlmHbzMzaXy5pfoCmJ15OO6v595KgSaBRw-dE_gPODcyayi92OJZqHv4oIwTzRSEmulQk7581FXuH71ThKGaRloc6Jrb9CZvaY"/>
<div class="absolute -top-4 -left-4 w-12 h-12 glass-panel rounded-xl flex items-center justify-center rotate-[-15deg]">
<span class="material-symbols-outlined text-primary" data-weight="fill">code</span>
</div>
<div class="absolute -bottom-2 -right-2 w-10 h-10 glass-panel rounded-lg flex items-center justify-center rotate-[10deg]">
<span class="material-symbols-outlined text-secondary" data-weight="fill">data_object</span>
</div>
</div>
</div>
</div>
</div>
<!-- Options Container -->
<div class="space-y-stack-md" id="options-list">
<!-- Option A -->
<label class="glass-panel rounded-2xl p-6 flex items-center justify-between cursor-pointer border border-transparent hover:border-primary/40 transition-all duration-300 group active:scale-[0.99]" data-option="A">
<div class="flex items-center gap-gutter">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-variant text-on-surface font-headline-md text-headline-md group-hover:bg-primary group-hover:text-on-primary transition-colors">
                        A
                    </div>
<span class="font-body-lg text-body-lg text-on-surface">简单易读的语法</span>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-outline-variant flex items-center justify-center transition-all option-checkbox">
<span class="material-symbols-outlined text-white scale-0 transition-transform duration-200">check</span>
</div>
<input class="hidden quiz-input" type="checkbox"/>
</label>
<!-- Option B -->
<label class="glass-panel rounded-2xl p-6 flex items-center justify-between cursor-pointer border border-transparent hover:border-primary/40 transition-all duration-300 group active:scale-[0.99]" data-option="B">
<div class="flex items-center gap-gutter">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-variant text-on-surface font-headline-md text-headline-md group-hover:bg-primary group-hover:text-on-primary transition-colors">
                        B
                    </div>
<span class="font-body-lg text-body-lg text-on-surface">动态类型</span>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-outline-variant flex items-center justify-center transition-all option-checkbox">
<span class="material-symbols-outlined text-white scale-0 transition-transform duration-200">check</span>
</div>
<input class="hidden quiz-input" type="checkbox"/>
</label>
<!-- Option C -->
<label class="glass-panel rounded-2xl p-6 flex items-center justify-between cursor-pointer border border-transparent hover:border-primary/40 transition-all duration-300 group active:scale-[0.99]" data-option="C">
<div class="flex items-center gap-gutter">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-variant text-on-surface font-headline-md text-headline-md group-hover:bg-primary group-hover:text-on-primary transition-colors">
                        C
                    </div>
<span class="font-body-lg text-body-lg text-on-surface">面向对象编程</span>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-outline-variant flex items-center justify-center transition-all option-checkbox">
<span class="material-symbols-outlined text-white scale-0 transition-transform duration-200">check</span>
</div>
<input class="hidden quiz-input" type="checkbox"/>
</label>
<!-- Option D -->
<label class="glass-panel rounded-2xl p-6 flex items-center justify-between cursor-pointer border border-transparent hover:border-primary/40 transition-all duration-300 group active:scale-[0.99]" data-option="D">
<div class="flex items-center gap-gutter">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-variant text-on-surface font-headline-md text-headline-md group-hover:bg-primary group-hover:text-on-primary transition-colors">
                        D
                    </div>
<span class="font-body-lg text-body-lg text-on-surface">编译型语言</span>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-outline-variant flex items-center justify-center transition-all option-checkbox">
<span class="material-symbols-outlined text-white scale-0 transition-transform duration-200">check</span>
</div>
<input class="hidden quiz-input" type="checkbox"/>
</label>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full h-24 bg-surface-container-low/90 backdrop-blur-2xl border-t border-outline-variant/10 px-margin-desktop z-50">
<div class="max-w-[1280px] mx-auto h-full flex items-center justify-between">
<button class="flex items-center gap-2 px-6 py-3 rounded-2xl hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">bookmark</span>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface">收藏本题</span>
</button>
<button class="px-12 py-4 rounded-2xl primary-gradient text-white font-headline-md text-headline-md primary-glow hover:scale-105 active:scale-95 transition-all">
                提交答案
            </button>
<button class="flex items-center gap-2 px-6 py-3 rounded-2xl hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary transition-colors">settings</span>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface">设置</span>
</button>
</div>
</footer>
<script>
        // Simple Interaction logic
        const options = document.querySelectorAll('label[data-option]');
        
        options.forEach(option => {
            const input = option.querySelector('.quiz-input');
            const checkbox = option.querySelector('.option-checkbox');
            const checkIcon = checkbox.querySelector('.material-symbols-outlined');
            const letterBox = option.querySelector('.bg-surface-variant');

            option.addEventListener('click', (e) => {
                // Prevent double trigger if clicking directly on input or its container
                if (e.target.tagName !== 'INPUT') {
                    input.checked = !input.checked;
                }
                
                if (input.checked) {
                    option.classList.remove('border-transparent');
                    option.classList.add('border-primary', 'bg-primary/5', 'shadow-[0_0_15px_rgba(99,102,241,0.15)]');
                    checkbox.classList.remove('border-outline-variant');
                    checkbox.classList.add('bg-primary', 'border-primary');
                    checkIcon.classList.remove('scale-0');
                    checkIcon.classList.add('scale-100');
                    letterBox.classList.add('bg-primary', 'text-on-primary');
                    letterBox.classList.remove('bg-surface-variant', 'text-on-surface');
                } else {
                    option.classList.add('border-transparent');
                    option.classList.remove('border-primary', 'bg-primary/5', 'shadow-[0_0_15px_rgba(99,102,241,0.15)]');
                    checkbox.classList.add('border-outline-variant');
                    checkbox.classList.remove('bg-primary', 'border-primary');
                    checkIcon.classList.add('scale-0');
                    checkIcon.classList.remove('scale-100');
                    letterBox.classList.remove('bg-primary', 'text-on-primary');
                    letterBox.classList.add('bg-surface-variant', 'text-on-surface');
                }
            });
        });
    </script>
</body></html>
